syntax = "proto3";

option go_package = 'github.com/MamangRust/monolith-payment-gateway-pb/order_item';

package pb.order_item;

import "google/protobuf/wrappers.proto";

message FindAllOrderItemRequest {
    int32 page = 1;
    int32 page_size = 2;
    string search = 3;
}

message FindByIdOrderItemRequest {
    int32 order_item_id = 1;
}

message OrderItemResponse {
    int32 id = 1;
    int32 order_id = 2;
    int32 product_id = 3;
    int32 quantity = 4;
    int32 price = 5;
    string created_at = 6;
    string updated_at = 7;
}

message OrderItemResponseDeleteAt {
    int32 id = 1;
    int32 order_id = 2;
    int32 product_id = 3;
    int32 quantity = 4;
    int32 price = 5;
    string created_at = 6;
    string updated_at = 7;
    google.protobuf.StringValue deleted_at = 8;
}

message ApiResponseOrderItem {
    string status = 1;
    string message = 2;
    OrderItemResponse data = 3;
}

message ApiResponseOrderItemDeleteAt {
    string status = 1;
    string message = 2;
    OrderItemResponseDeleteAt data = 3;
}

message ApiResponsesOrderItem {
    string status = 1;
    string message = 2;
    repeated OrderItemResponse data = 3;
}

message ApiResponseOrderItemDelete {
    string status = 1;
    string message = 2;
}

message ApiResponseOrderItemAll {
    string status = 1;
    string message = 2;
}
