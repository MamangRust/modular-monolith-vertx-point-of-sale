apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-cluster-config
  namespace: pointofsale
data:
  redis.conf: |
    port 6379
    cluster-enabled yes
    cluster-config-file nodes.conf
    cluster-node-timeout 5000
    appendonly yes
    protected-mode no
    bind 0.0.0.0
    requirepass dragon_knight
    masterauth dragon_knight
