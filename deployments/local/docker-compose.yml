services:
  postgres:
    image: postgres:17-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: DRAGON
      POSTGRES_PASSWORD: DRAGON
      POSTGRES_DB: POINT_OF_SALE
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=C"
      PGDATA: /var/lib/postgresql/data/pgdata
    command:
      - "postgres"
      - "-c"
      - "max_connections=1000"
      - "-c"
      - "shared_buffers=4GB"
      - "-c"
      - "effective_cache_size=12GB"
      - "-c"
      - "maintenance_work_mem=512MB"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "wal_buffers=16MB"
      - "-c"
      - "default_statistics_target=100"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"
      - "-c"
      - "work_mem=32MB"
      - "-c"
      - "min_wal_size=1GB"
      - "-c"
      - "max_wal_size=4GB"
      - "-c"
      - "max_worker_processes=8"
      - "-c"
      - "max_parallel_workers_per_gather=4"
      - "-c"
      - "max_parallel_workers=8"
      - "-c"
      - "max_parallel_maintenance_workers=4"
      - "-c"
      - "log_min_duration_statement=1000"
      - "-c"
      - "log_line_prefix=%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h "
      - "-c"
      - "superuser_reserved_connections=10"
      - "-c"
      - "idle_in_transaction_session_timeout=60000"
      - "-c"
      - "statement_timeout=30000"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U DRAGON -d POINT_OF_SALE"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: postgres_exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://DRAGON:DRAGON@postgres:5432/POINT_OF_SALE?sslmode=disable&connect_timeout=10"
      PG_EXPORTER_AUTO_DISCOVER_DATABASES: "true"
      PG_EXPORTER_DISABLE_DEFAULT_METRICS: "false"
      PG_EXPORTER_DISABLE_SETTINGS_METRICS: "false"
    ports:
      - "9187:9187"
    depends_on:
      - postgres
    networks:
      - app_network
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: pgbouncer_debug
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: DRAGON
      DB_PASSWORD: DRAGON
      DB_NAME: POINT_OF_SALE
      AUTH_TYPE: scram-sha-256
      POOL_MODE: transaction
      DEFAULT_POOL_SIZE: 200
      MIN_POOL_SIZE: 50
      MAX_DB_CONNECTIONS: 800
      MAX_CLIENT_CONN: 10000
      RESERVE_POOL_SIZE: 100
      RESERVE_POOL_TIMEOUT: 5
      SERVER_IDLE_TIMEOUT: 600
      QUERY_TIMEOUT: 30
      SERVER_CONNECT_TIMEOUT: 10
      SERVER_LOGIN_RETRY: 5
      SERVER_RESET_QUERY: DISCARD ALL
      SERVER_RESET_QUERY_ALWAYS: 0
      TCP_KEEPALIVE: 1
      TCP_KEEPCNT: 5
      TCP_KEEPIDLE: 30
      TCP_KEEPINTVL: 10
      ADMIN_USERS: DRAGON
      STATS_USERS: DRAGON
      LOG_CONNECTIONS: 0
      LOG_DISCONNECTIONS: 0
      LOG_POOLER_ERRORS: 1
    ports:
      - "6432:5432"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "PGPASSWORD=DRAGON psql -h localhost -p 5432 -U DRAGON -d pgbouncer -c 'SHOW POOLS;' || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  pyroscope:
    image: grafana/pyroscope:latest
    ports:
      - 4040:4040
    networks:
      - app_network

  redis-node-1:
    image: redis:7.4
    container_name: redis_node_1
    command: redis-server --appendonly yes --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --requirepass dragon_knight --masterauth dragon_knight
    ports:
      - "6379:6379"
    volumes:
      - redis_node_1_data:/data
    restart: unless-stopped
    networks:
      - app_network

  redis-node-2:
    image: redis:7.4
    container_name: redis_node_2
    command: redis-server --appendonly yes --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --requirepass dragon_knight --masterauth dragon_knight
    volumes:
      - redis_node_2_data:/data
    restart: unless-stopped
    networks:
      - app_network

  redis-node-3:
    image: redis:7.4
    container_name: redis_node_3
    command: redis-server --appendonly yes --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --requirepass dragon_knight --masterauth dragon_knight
    volumes:
      - redis_node_3_data:/data
    restart: unless-stopped
    networks:
      - app_network

  redis-node-4:
    image: redis:7.4
    container_name: redis_node_4
    command: redis-server --appendonly yes --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --requirepass dragon_knight --masterauth dragon_knight
    volumes:
      - redis_node_4_data:/data
    restart: unless-stopped
    networks:
      - app_network

  redis-node-5:
    image: redis:7.4
    container_name: redis_node_5
    command: redis-server --appendonly yes --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --requirepass dragon_knight --masterauth dragon_knight
    volumes:
      - redis_node_5_data:/data
    restart: unless-stopped
    networks:
      - app_network

  redis-node-6:
    image: redis:7.4
    container_name: redis_node_6
    command: redis-server --appendonly yes --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --requirepass dragon_knight --masterauth dragon_knight
    volumes:
      - redis_node_6_data:/data
    restart: unless-stopped
    networks:
      - app_network

  redis-cluster-creator:
    image: redis:7.4
    container_name: redis_cluster_creator
    depends_on:
      - redis-node-1
      - redis-node-2
      - redis-node-3
      - redis-node-4
      - redis-node-5
      - redis-node-6
    entrypoint: >
      sh -c "sleep 5 && echo 'yes' | redis-cli -a dragon_knight --cluster create
      redis-node-1:6379
      redis-node-2:6379
      redis-node-3:6379
      redis-node-4:6379
      redis-node-5:6379
      redis-node-6:6379
      --cluster-replicas 1"
    networks:
      - app_network

  node-exporter:
    image: quay.io/prometheus/node-exporter
    container_name: node-exporter
    pid: "host"
    networks:
      - app_network
    volumes:
      - "/:/host:ro,rslave"
    command:
      - "--path.rootfs=/host"

  kafka:
    image: apache/kafka:latest
    container_name: my-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      KAFKA_CLUSTER_ID: kraft-cluster-01
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    networks:
      - app_network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager
    volumes:
      - ./observability/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    ports:
      - "9093:9093"
    networks:
      - app_network

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/rules:/etc/prometheus/rules
    networks:
      - app_network
    depends_on:
      - otel-collector
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-storage:/var/lib/grafana
    networks:
      - app_network
    depends_on:
      - prometheus
      - jaeger
      - alertmanager
      - loki

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - apigateway
    networks:
      - app_network

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./observability/otel-collector.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "13133:13133"
      - "8889:8889"
    depends_on:
      - jaeger
    networks:
      - app_network
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    container_name: jaeger
    ports:
      - "16686:16686"
      - "14250:14250"
    networks:
      - app_network
    environment:
      - COLLECTOR_OTLP_ENABLED=true

  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.9.0
    container_name: kafka-exporter
    ports:
      - "9308:9308"
    networks:
      - app_network
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - "--kafka.server=my-kafka:9092"
      - "--web.listen-address=0.0.0.0:9308"
      - "--log.level=debug"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --quiet --tries=1 --spider http://localhost:9308/metrics || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  loki:
    container_name: loki
    image: grafana/loki:3.5.8
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki-config.yaml:/etc/loki/local-config.yaml
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - app_network

  apigateway:
    build:
      context: ./apigateway
      dockerfile: Dockerfile
    image: monolith-point-of-sale-grpc-vertx/apigateway:latest
    container_name: apigateway
    env_file: ./docker.env
    volumes:
      - ./docker.env:/app/docker.env
    ports:
      - "5000:5000"
      - "8091:8091"
    networks:
      - app_network
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis-node-1:
        condition: service_started
      auth:
        condition: service_started
      role:
        condition: service_started
      merchant:
        condition: service_started
      transaction:
        condition: service_started
      cashier:
        condition: service_started
      category:
        condition: service_started
      product:
        condition: service_started
      order:
        condition: service_started
      order_item:
        condition: service_started
    environment:
      - REDIS_HOST=${REDIS_HOST_APIGATEWAY}
      - REDIS_PORT=${REDIS_PORT_APIGATEWAY}
      - REDIS_PASSWORD=${REDIS_PASSWORD_APIGATEWAY}
      - OTEL_ENDPOINT=otel-collector:4317
      - APP_ENV=docker
      - KAFKA_BROKERS=kafka:9092
      - HTTP_PORT=5000

  auth:
    build:
      context: ./auth
      dockerfile: Dockerfile
    image: monolith-point-of-sale-grpc-vertx/auth:latest
    container_name: auth
    env_file: ./docker.env
    volumes:
      - ./docker.env:/app/docker.env
    networks:
      - app_network
    depends_on:
      pgbouncer:
        condition: service_healthy
      kafka:
        condition: service_healthy
      otel-collector:
        condition: service_started
      redis-node-1:
        condition: service_started
    environment:
      - REDIS_HOST=${REDIS_HOST_AUTH}
      - REDIS_PORT=${REDIS_PORT_AUTH}
      - REDIS_PASSWORD=${REDIS_PASSWORD_AUTH}
      - OTEL_ENDPOINT=otel-collector:4317
      - APP_ENV=docker
      - KAFKA_BROKERS=kafka:9092
      - GRPC_PORT=${GRPC_AUTH_PORT}

  merchant:
    build:
      context: ./merchant
      dockerfile: Dockerfile
    image: monolith-point-of-sale-grpc-vertx/merchant:latest
    container_name: merchant
    env_file: ./docker.env
    volumes:
      - ./docker.env:/app/docker.env
    networks:
      - app_network
    depends_on:
      pgbouncer:
        condition: service_healthy
      kafka:
        condition: service_healthy
      otel-collector:
        condition: service_started
      redis-node-1:
        condition: service_started
    environment:
      - REDIS_HOST=${REDIS_HOST_MERCHANT}
      - REDIS_PORT=${REDIS_PORT_MERCHANT}
      - REDIS_PASSWORD=${REDIS_PASSWORD_MERCHANT}
      - OTEL_ENDPOINT=otel-collector:4317
      - APP_ENV=docker
      - KAFKA_BROKERS=kafka:9092
      - GRPC_PORT=${GRPC_MERCHANT_PORT}

  role:
    build:
      context: ./role
      dockerfile: Dockerfile
    image: monolith-point-of-sale-grpc-vertx/role:latest
    container_name: role
    env_file: ./docker.env
    volumes:
      - ./docker.env:/app/docker.env
    networks:
      - app_network
    depends_on:
      pgbouncer:
        condition: service_healthy
      kafka:
        condition: service_healthy
      otel-collector:
        condition: service_started
      redis-node-1:
        condition: service_started
    environment:
      - REDIS_HOST=${REDIS_HOST_ROLE}
      - REDIS_PORT=${REDIS_PORT_ROLE}
      - REDIS_PASSWORD=${REDIS_PASSWORD_ROLE}
      - OTEL_ENDPOINT=otel-collector:4317
      - APP_ENV=docker
      - KAFKA_BROKERS=kafka:9092
      - GRPC_PORT=${GRPC_ROLE_PORT}

  transaction:
    build:
      context: ./transaction
      dockerfile: Dockerfile
    image: monolith-point-of-sale-grpc-vertx/transaction:latest
    container_name: transaction
    env_file: ./docker.env
    volumes:
      - ./docker.env:/app/docker.env
    networks:
      - app_network
    depends_on:
      pgbouncer:
        condition: service_healthy
      kafka:
        condition: service_healthy
      otel-collector:
        condition: service_started
      redis-node-1:
        condition: service_started
    environment:
      - REDIS_HOST=${REDIS_HOST_TRANSACTION}
      - REDIS_PORT=${REDIS_PORT_TRANSACTION}
      - REDIS_PASSWORD=${REDIS_PASSWORD_TRANSACTION}
      - OTEL_ENDPOINT=otel-collector:4317
      - APP_ENV=docker
      - KAFKA_BROKERS=kafka:9092
      - GRPC_PORT=${GRPC_TRANSACTION_PORT}

  cashier:
    build:
      context: ./cashier
      dockerfile: Dockerfile
    image: monolith-point-of-sale-grpc-vertx/cashier:latest
    container_name: cashier
    env_file: ./docker.env
    volumes:
      - ./docker.env:/app/docker.env
    networks:
      - app_network
    depends_on:
      pgbouncer:
        condition: service_healthy
      kafka:
        condition: service_healthy
      otel-collector:
        condition: service_started
      redis-node-1:
        condition: service_started
    environment:
      - REDIS_HOST=${REDIS_HOST_CASHIER}
      - REDIS_PORT=${REDIS_PORT_CASHIER}
      - REDIS_PASSWORD=${REDIS_PASSWORD_CASHIER}
      - OTEL_ENDPOINT=otel-collector:4317
      - APP_ENV=docker
      - KAFKA_BROKERS=kafka:9092
      - GRPC_PORT=${GRPC_CASHIER_PORT}

  category:
    build:
      context: ./category
      dockerfile: Dockerfile
    image: monolith-point-of-sale-grpc-vertx/category:latest
    container_name: category
    env_file: ./docker.env
    volumes:
      - ./docker.env:/app/docker.env
    networks:
      - app_network
    depends_on:
      pgbouncer:
        condition: service_healthy
      kafka:
        condition: service_healthy
      otel-collector:
        condition: service_started
      redis-node-1:
        condition: service_started
    environment:
      - REDIS_HOST=${REDIS_HOST_CATEGORY}
      - REDIS_PORT=${REDIS_PORT_CATEGORY}
      - REDIS_PASSWORD=${REDIS_PASSWORD_CATEGORY}
      - OTEL_ENDPOINT=otel-collector:4317
      - APP_ENV=docker
      - KAFKA_BROKERS=kafka:9092
      - GRPC_PORT=${GRPC_CATEGORY_PORT}

  product:
    build:
      context: ./product
      dockerfile: Dockerfile
    image: monolith-point-of-sale-grpc-vertx/product:latest
    container_name: product
    env_file: ./docker.env
    volumes:
      - ./docker.env:/app/docker.env
    networks:
      - app_network
    depends_on:
      pgbouncer:
        condition: service_healthy
      kafka:
        condition: service_healthy
      otel-collector:
        condition: service_started
      redis-node-1:
        condition: service_started
    environment:
      - REDIS_HOST=${REDIS_HOST_PRODUCT}
      - REDIS_PORT=${REDIS_PORT_PRODUCT}
      - REDIS_PASSWORD=${REDIS_PASSWORD_PRODUCT}
      - OTEL_ENDPOINT=otel-collector:4317
      - APP_ENV=docker
      - KAFKA_BROKERS=kafka:9092
      - GRPC_PORT=${GRPC_PRODUCT_PORT}

  order:
    build:
      context: ./order
      dockerfile: Dockerfile
    image: monolith-point-of-sale-grpc-vertx/order:latest
    container_name: order
    env_file: ./docker.env
    volumes:
      - ./docker.env:/app/docker.env
    networks:
      - app_network
    depends_on:
      pgbouncer:
        condition: service_healthy
      kafka:
        condition: service_healthy
      otel-collector:
        condition: service_started
      redis-node-1:
        condition: service_started
    environment:
      - REDIS_HOST=${REDIS_HOST_ORDER}
      - REDIS_PORT=${REDIS_PORT_ORDER}
      - REDIS_PASSWORD=${REDIS_PASSWORD_ORDER}
      - OTEL_ENDPOINT=otel-collector:4317
      - APP_ENV=docker
      - KAFKA_BROKERS=kafka:9092
      - GRPC_PORT=${GRPC_ORDER_PORT}

  order_item:
    build:
      context: ./order_item
      dockerfile: Dockerfile
    image: monolith-point-of-sale-grpc-vertx/order_item:latest
    container_name: order_item
    env_file: ./docker.env
    volumes:
      - ./docker.env:/app/docker.env
    networks:
      - app_network
    depends_on:
      pgbouncer:
        condition: service_healthy
      kafka:
        condition: service_healthy
      otel-collector:
        condition: service_started
      redis-node-1:
        condition: service_started
    environment:
      - REDIS_HOST=${REDIS_HOST_ORDERITEM}
      - REDIS_PORT=${REDIS_PORT_ORDERITEM}
      - REDIS_PASSWORD=${REDIS_PASSWORD_ORDERITEM}
      - OTEL_ENDPOINT=otel-collector:4317
      - APP_ENV=docker
      - KAFKA_BROKERS=kafka:9092
      - GRPC_PORT=${GRPC_ORDER_ITEM_PORT}

  email:
    build:
      context: ./email
      dockerfile: Dockerfile
    image: monolith-point-of-sale-grpc-vertx/email:latest
    container_name: email
    env_file: ./docker.env
    volumes:
      - ./docker.env:/app/docker.env
    networks:
      - app_network
    depends_on:
      kafka:
        condition: service_healthy
      otel-collector:
        condition: service_started
    environment:
      - OTEL_ENDPOINT=otel-collector:4317
      - APP_ENV=docker
      - KAFKA_BROKERS=kafka:9092
      - SMTP_SERVER=${SMTP_SERVER}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}

volumes:
  loki-data:
  grafana-storage:
  postgres_data:
  kafka_data:
  redis_node_1_data:
  redis_node_2_data:
  redis_node_3_data:
  redis_node_4_data:
  redis_node_5_data:
  redis_node_6_data:

networks:
  app_network:
    driver: bridge
