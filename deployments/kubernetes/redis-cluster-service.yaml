apiVersion: v1
kind: Service
metadata:
  name: redis-cluster-headless
  namespace: pointofsale
  labels:
    app: redis-cluster
spec:
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
    - name: gossip
      port: 16379
      targetPort: 16379
  clusterIP: None
  selector:
    app: redis-cluster
---
apiVersion: v1
kind: Service
metadata:
  name: redis-cluster
  namespace: pointofsale
  labels:
    app: redis-cluster
spec:
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
  selector:
    app: redis-cluster
  type: ClusterIP
